<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Transaction Manager Pro</title>

<style>

/* 🌙 BODY */
body {
    margin:0;
    font-family:'Segoe UI';
    /* background: linear-gradient(135deg,#020617,#0f172a,#1e293b); */
    background-color: #1a753b;
    color:white;
}

/* HEADER */
.header {
    text-align:center;
    padding:20px;
}


/* LOGIN */
.login-box input {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:6px;
}

/* CARD */
.card {
    max-width:70%;
    margin:30px auto;
    padding:25px;
    border-radius:15px;
    background: rgba(201, 212, 210, 0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(44, 38, 38, 0.5);
}

/* BUTTON */
button {
    background: linear-gradient(45deg,#95c632,#1d8f3d);
    border:none;
    padding:10px 15px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    transform:scale(1.05);
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th, td {
    padding:12px;
    text-align:center;
}
th {
    background: rgba(255,255,255,0.1);
}
tr:hover {
    background: rgba(255,255,255,0.08);
}

/* 🔥 MODAL */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal-box {
    width:350px;
    
    padding:25px;
    border-radius:18px;
    background: linear-gradient(145deg,#4d6fa6,#3658a9);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: popUp 0.25s ease;
}

.modal-box h3 {
    margin-bottom:15px;
    text-align:center;
    color:#77afc7;
}

.modal-box input,
.modal-box select {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
    background:#0f172a;
    color:white;
}

.modal-actions {
    display:flex;
    margin-top:10px;
}

.modal-actions button {
    flex:1;
    margin:5px;
}

.save-btn {
    background: linear-gradient(45deg,#22c55e,#4ade80);
}
.close-btn {
    background:#bb1a1a;
}



#clockBox {
    text-align:center;
    margin-top:10px;
}

#time {
    font-size:36px;
    font-weight:bold;
    letter-spacing:2px;
}

#date {
    font-size:14px;
    opacity:0.7;
}

/* TOP BAR */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
}

/* LOGO */
.logo {
    font-size:20px;
    font-weight:bold;
}

/* USER SECTION (RIGHT SIDE) */
.user-section {
    display:flex;
    align-items:center;
    gap:10px;
}

.user-section span {
    font-size:14px;
    opacity:0.8;
}

/* LOGOUT BUTTON SMALL STYLE */
#logoutBtn {
    padding:6px 12px;
    font-size:12px;
    border-radius:6px;
}

@keyframes popUp {
    from {transform:scale(0.8); opacity:0;}
    to {transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<div class="header">

  <div class="topbar">
    <div class="logo"> Transaction Manager</div>

    <div class="user-section">
      <span id="userEmail">👀 Guest</span>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </div>

  <!-- CLOCK -->
  <div id="clockBox">
    <div id="time"></div>
    <div id="date"></div>
  </div>

</div>

<!-- LOGIN -->
<div id="loginBox" class="header login-box">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">Login</button>
</div>

<div class="card">
<button id="addBtn" style="display:none;">➕ Add Transaction</button>

<h3 id="balance"></h3>

<table>
<thead>
<tr>
<th>Staff</th>
<th>Type</th>
<th>Amount</th>
<th>Reason</th>
<th>Date</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>💸 Add Transaction</h3>

<select id="staff">
<option>Jonayed</option>
<option>Hridoy</option>
<option>Anas</option>
<option>Arif</option>
<option>Arman</option>
<option>Saiful</option>
<option>Falan</option>
<option>Mizan</option>
<option>Sujon Sir</option>
</select>

<select id="type">
<option value="give">Given</option>
<option value="take">Taken</option>
</select>

<input id="amount" type="number" placeholder="Enter Amount">
<input id="note" placeholder="Reason">

<div class="modal-actions">
<button class="save-btn" id="saveBtn">Save</button>
<button class="close-btn" onclick="closeModal()">Cancel</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const config = {
  apiKey: "AIzaSyCztqUkKjz-fd2iRLnDUPiZ1X5HOFCGHGQ",
  authDomain: "transaction-manager-de37d.firebaseapp.com",
  projectId: "transaction-manager-de37d"
};

const app = initializeApp(config);
const db = getFirestore(app);
const auth = getAuth(app);

/* CLOCK */
setInterval(()=>{
    let now = new Date();

    let time = now.toLocaleTimeString();
    let date = now.toLocaleDateString();

    document.getElementById("time").innerText = time;
    document.getElementById("date").innerText = date;

},1000);

/* LOGIN */
loginBtn.onclick = ()=>{
    if(email.value !== "mizan.universelink@gmail.com"){
        alert("Access Denied ❌");
        return;
    }

    signInWithEmailAndPassword(auth,email.value,password.value)
    .then(()=> alert("Login success"))
    .catch(()=> alert("Wrong password"));
};

logoutBtn.onclick = ()=> signOut(auth);

/* AUTH */
onAuthStateChanged(auth,user=>{
    if(user && user.email === "mizan.universelink@gmail.com"){
        // userEmail.innerText = "Admin: " + user.email;
        addBtn.style.display="inline-block";
        logoutBtn.style.display="inline-block";
        loginBox.style.display="none";
    } else {
        userEmail.innerText="👀 Guest Mode";
        addBtn.style.display="none";
        logoutBtn.style.display="none";
        loginBox.style.display="block";
    }
});

/* MODAL */
addBtn.onclick = ()=> modal.style.display="flex";
window.closeModal = ()=> modal.style.display="none";

/* SAVE */
saveBtn.onclick = async ()=>{
    if(!amount.value) return alert("Enter amount");

    await addDoc(collection(db,"transactions"),{
        staff: staff.value,
        type: type.value,
        amount: Number(amount.value),
        note: note.value,
        time: new Date().toLocaleString()
    });

    closeModal();
};

/* LOAD DATA */
const q = query(collection(db,"transactions"), orderBy("time","desc"));

onSnapshot(q,snapshot=>{
    let total=0;
    tableBody.innerHTML="";

    snapshot.forEach(doc=>{
        let d = doc.data();

        if(d.type==="take") total+=d.amount;
        else total-=d.amount;

        tableBody.innerHTML += `
        <tr>
            <td>${d.staff}</td>
            <td>${d.type}</td>
            <td>${d.amount}</td>
            <td>${d.note}</td>
            <td>${d.time}</td>
        </tr>`;
    });

    balance.innerText = "Total Balance: "+total+" TK";
});

</script>

</body>
</html>
